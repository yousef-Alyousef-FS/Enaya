name: enaya
description: "Medical Center Management System"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Localization
  easy_localization: ^3.0.7

  # API & Networking
  dio: ^5.4.0
  internet_connection_checker_plus: ^2.5.1

  # State Management
  provider: ^6.1.1

  # Dependency Injection
  get_it: ^7.6.6

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Functional Programming
  dartz: ^0.10.1

  # Data Modeling
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Responsive Design
  flutter_screenutil: ^5.9.0

  # UI Effects
  shimmer: ^3.0.0
  awesome_dialog: ^3.2.1
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^2.7.0

  # Navigation
  go_router: ^13.2.0

  # Utilities
  intl: ^0.20.2
  logger: ^2.0.2
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation for data models
  build_runner: ^2.5.0
  freezed: ^2.4.0
  json_serializable: ^6.6.0
  # Customize Native Splash Screen
  flutter_native_splash: ^2.4.0
  # System Icon
  flutter_launcher_icons: ^0.13.1
  # Testing Mocking Library
  mocktail: ^1.0.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21

flutter_native_splash:
  color: "#242442"
  image: assets/images/logo.png
  android: true
  ios: true

  android_12:
    color: "#242442"
    image: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/mock_data/
